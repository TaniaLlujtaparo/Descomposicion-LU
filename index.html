<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Factorización LU & Cholesky — Solver Pro</title>
<style>
  :root {
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text-main: #1e293b;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --accent: #0ea5e9;
    --success: #10b981;
    --error: #ef4444;
    --code-bg: #1e293b;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text-main); line-height: 1.5; padding: 2rem 1rem; }
  .container { max-width: 1000px; margin: 0 auto; background: var(--card-bg); border-radius: 16px; padding: 2.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid var(--border); }
  
  h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px; background: linear-gradient(to right, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: 15px; color: var(--text-muted); margin-bottom: 2rem; }

  /* Controles */
  .controls-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #f1f5f9; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
  .control-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); margin-bottom: 6px; display: block; text-transform: uppercase; }
  select, .btn { width: 100%; height: 42px; border-radius: 8px; font-size: 14px; font-weight: 600; transition: all 0.2s; border: 1px solid var(--border); }
  select { background: #fff; padding: 0 12px; cursor: pointer; }
  
  .btn { background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .btn:hover { border-color: var(--primary); color: var(--primary); transform: translateY(-1px); }
  .btn-primary { background: var(--primary); color: white; border: none; }
  .btn-primary:hover { background: var(--primary-hover); color: white; }
  .btn-clear { color: var(--error); }
  .btn-clear:hover { background: #fef2f2; border-color: var(--error); }

  /* Matriz */
  .matrix-wrapper { overflow-x: auto; padding: 1.5rem; background: #fff; border: 1px solid var(--border); border-radius: 12px; margin-bottom: 1rem; }
  .matrix-grid { display: inline-grid; gap: 8px; }
  .matrix-input { width: 75px; height: 42px; text-align: center; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 14px; }
  .matrix-input:focus { border-color: var(--primary); outline: 3px solid rgba(79, 70, 229, 0.1); }
  .matrix-input.b-col { background: #eff6ff; border-color: #bfdbfe; font-weight: 700; color: var(--primary); }
  .separator { color: var(--border); font-size: 24px; padding: 0 10px; display: flex; align-items: center; }

  /* Resultados */
  .section-label { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin: 2.5rem 0 1rem; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ""; height: 1px; background: var(--border); flex: 1; }
  
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
  .card { background: #fff; border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
  .card-title { font-size: 11px; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
  
  table.mat { border-collapse: collapse; width: 100%; }
  table.mat td { font-family: monospace; font-size: 13px; padding: 8px; text-align: right; border: 1px solid #f1f5f9; }
  table.mat td.diag { color: var(--primary); font-weight: 700; background: #f5f7ff; }

  .sol-row { display: flex; gap: 12px; flex-wrap: wrap; }
  .sol-var { background: #fff; border: 1px solid var(--primary); border-radius: 12px; padding: 15px; text-align: center; min-width: 100px; }
  .sol-var .val { font-size: 24px; font-weight: 800; color: var(--primary); font-family: monospace; }

  .steps-block { background: var(--code-bg); color: #cbd5e1; border-radius: 12px; padding: 1.5rem; overflow-x: auto; font-family: monospace; font-size: 13px; }
  .step-head { color: #fff; font-weight: 700; margin: 15px 0 5px; border-left: 3px solid var(--primary); padding-left: 10px; text-transform: uppercase; }
  .step { padding: 4px 0; border-bottom: 1px solid #334155; opacity: 0.8; }
  .step .hi { color: #38bdf8; font-weight: 700; }

  .error-msg { background: #fef2f2; border: 1px solid #fee2e2; border-radius: 8px; padding: 16px; color: var(--error); font-weight: 600; }
</style>
</head>
<body>

<div class="container">
  <h1>Factorización de Matrices</h1>
  <p class="sub">Resuelve sistemas mediante Doolittle, Crout o Cholesky</p>

  <div class="controls-row">
    <div class="control-group">
      <label>Método</label>
      <select id="methodSelect">
        <option value="doolittle">Doolittle (Lii = 1)</option>
        <option value="crout">Crout (Uii = 1)</option>
        <option value="cholesky">Cholesky (A = LLᵀ)</option>
      </select>
    </div>
    <div class="control-group">
      <label>Dimensión</label>
      <select id="dimSelect">
        <option value="2">2×2</option>
        <option value="3" selected>3×3</option>
        <option value="4">4×4</option>
      </select>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button class="btn btn-primary" onclick="solveAll()">▶ Calcular</button>
    </div>
    <div class="control-group">
      <label>&nbsp;</label>
      <button class="btn btn-clear" onclick="buildMatrix()">Limpiar</button>
    </div>
  </div>

  <div class="section-label">Matriz de Entrada</div>
  <div class="matrix-wrapper">
    <div id="matrixContainer"></div>
  </div>

  <div id="resultContainer"></div>
</div>

<script>
let n = 3;

function buildMatrix() {
  n = parseInt(document.getElementById('dimSelect').value);
  const container = document.getElementById('matrixContainer');
  let html = `<div class="matrix-grid" style="grid-template-columns: repeat(${n}, auto) auto auto;">`;
  for (let i = 0; i < n; i++) {
    for (let j = 0; j < n; j++) {
      html += `<input class="matrix-input" id="a${i}_${j}" type="number" step="any" value="0">`;
    }
    html += `<div class="separator">|</div>`;
    html += `<input class="matrix-input b-col" id="b${i}" type="number" step="any" value="0">`;
  }
  html += '</div>';
  container.innerHTML = html;
  document.getElementById('resultContainer').innerHTML = '';
}

function fmt(v) {
  if (Math.abs(v) < 1e-10) return "0";
  return Number.isInteger(v) ? v.toString() : v.toFixed(4);
}

function getInputs() {
  const A = [], b = [];
  for (let i = 0; i < n; i++) {
    A.push([]);
    for (let j = 0; j < n; j++) {
      A[i].push(parseFloat(document.getElementById(`a${i}_${j}`).value) || 0);
    }
    b.push(parseFloat(document.getElementById(`b${i}`).value) || 0);
  }
  return { A, b };
}

// --- Algoritmos ---

function doolittle(A) {
  const L = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => i === j ? 1 : 0));
  const U = Array.from({length: n}, () => Array(n).fill(0));
  let steps = [];

  for (let i = 0; i < n; i++) {
    for (let j = i; j < n; j++) {
      let sum = 0;
      for (let k = 0; k < i; k++) sum += L[i][k] * U[k][j];
      U[i][j] = A[i][j] - sum;
      steps.push(`U[${i+1}][${j+1}] = ${A[i][j]} - ${sum.toFixed(2)} = ${U[i][j].toFixed(4)}`);
    }
    for (let j = i + 1; j < n; j++) {
      let sum = 0;
      for (let k = 0; k < i; k++) sum += L[j][k] * U[k][i];
      if (Math.abs(U[i][i]) < 1e-12) throw new Error("División por cero en Doolittle (Uii=0)");
      L[j][i] = (A[j][i] - sum) / U[i][i];
      steps.push(`L[${j+1}][${i+1}] = (${A[j][i]} - ${sum.toFixed(2)}) / ${U[i][i].toFixed(2)} = ${L[j][i].toFixed(4)}`);
    }
  }
  return { L, U, steps };
}

function crout(A) {
  const L = Array.from({length: n}, () => Array(n).fill(0));
  const U = Array.from({length: n}, (_, i) => Array.from({length: n}, (_, j) => i === j ? 1 : 0));
  let steps = [];

  for (let j = 0; j < n; j++) {
    for (let i = j; i < n; i++) {
      let sum = 0;
      for (let k = 0; k < j; k++) sum += L[i][k] * U[k][j];
      L[i][j] = A[i][j] - sum;
      steps.push(`L[${i+1}][${j+1}] = ${A[i][j]} - ${sum.toFixed(2)} = ${L[i][j].toFixed(4)}`);
    }
    for (let i = j + 1; i < n; i++) {
      let sum = 0;
      for (let k = 0; k < j; k++) sum += L[j][k] * U[k][i];
      if (Math.abs(L[j][j]) < 1e-12) throw new Error("División por cero en Crout (Ljj=0)");
      U[j][i] = (A[j][i] - sum) / L[j][j];
      steps.push(`U[${j+1}][${i+1}] = (${A[j][i]} - ${sum.toFixed(2)}) / ${L[j][j].toFixed(2)} = ${U[j][i].toFixed(4)}`);
    }
  }
  return { L, U, steps };
}

function cholesky(A) {
  const L = Array.from({length: n}, () => Array(n).fill(0));
  let steps = [];

  for (let i = 0; i < n; i++) {
    for (let j = 0; j <= i; j++) {
      let sum = 0;
      for (let k = 0; k < j; k++) sum += L[i][k] * L[j][k];
      
      if (i === j) {
        let val = A[i][i] - sum;
        if (val < 0) throw new Error("La matriz no es definida positiva (raíz negativa)");
        L[i][j] = Math.sqrt(val);
        steps.push(`L[${i+1}][${j+1}] = √(${A[i][i]} - ${sum.toFixed(2)}) = ${L[i][j].toFixed(4)}`);
      } else {
        if (Math.abs(L[j][j]) < 1e-12) throw new Error("División por cero en Cholesky");
        L[i][j] = (A[i][j] - sum) / L[j][j];
        steps.push(`L[${i+1}][${j+1}] = (${A[i][j]} - ${sum.toFixed(2)}) / ${L[j][j].toFixed(2)} = ${L[i][j].toFixed(4)}`);
      }
    }
  }
  const LT = L[0].map((_, colIndex) => L.map(row => row[colIndex]));
  return { L, U: LT, steps };
}

// --- Resolución del sistema ---

function substitution(L, U, b) {
  const y = Array(n).fill(0);
  for (let i = 0; i < n; i++) {
    let sum = 0;
    for (let k = 0; k < i; k++) sum += L[i][k] * y[k];
    y[i] = (b[i] - sum) / L[i][i];
  }
  const x = Array(n).fill(0);
  for (let i = n - 1; i >= 0; i--) {
    let sum = 0;
    for (let k = i + 1; k < n; k++) sum += U[i][k] * x[k];
    x[i] = (y[i] - sum) / U[i][i];
  }
  return x;
}

function solveAll() {
  const { A, b } = getInputs();
  const method = document.getElementById('methodSelect').value;
  const container = document.getElementById('resultContainer');
  
  try {
    let result;
    if (method === 'doolittle') result = doolittle(A);
    else if (method === 'crout') result = crout(A);
    else result = cholesky(A);

    const x = substitution(result.L, result.U, b);

    let html = `
      <div class="section-label">Matrices Resultantes (${method.toUpperCase()})</div>
      <div class="cards">
        <div class="card"><div class="card-title">Matriz L (Inferior)</div><table class="mat">${result.L.map((r, i) => `<tr>${r.map((v, j) => `<td class="${i===j?'diag':''}">${fmt(v)}</td>`).join('')}</tr>`).join('')}</table></div>
        <div class="card"><div class="card-title">${method === 'cholesky' ? 'Matriz Lᵀ (Transpuesta)' : 'Matriz U (Superior)'}</div><table class="mat">${result.U.map((r, i) => `<tr>${r.map((v, j) => `<td class="${i===j?'diag':''}">${fmt(v)}</td>`).join('')}</tr>`).join('')}</table></div>
      </div>

      <div class="section-label">Solución del Sistema</div>
      <div class="sol-row">${x.map((val, i) => `<div class="sol-var"><div class="card-title">x${i+1}</div><div class="val">${fmt(val)}</div></div>`).join('')}</div>

      <div class="section-label">Pasos de Factorización</div>
      <div class="steps-block">${result.steps.map(s => `<div class="step">${s.replace(/=\s*(-?[\d.]+)/, '= <span class="hi">$1</span>')}</div>`).join('')}</div>
    `;
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `<div class="error-msg">⚠️ Error: ${e.message}</div>`;
  }
}

document.getElementById('dimSelect').addEventListener('change', buildMatrix);
buildMatrix();
</script>
</body>
</html>
